name: Build and push for both x86_64 and arm64

on:
  workflow_dispatch:
    inputs:
      push_to_ghcr:
        description: Also push images to GitHub Container Registry (ghcr.io)
        type: boolean
        required: false
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      PUSH_TO_GHCR: ${{ inputs.push_to_ghcr }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image owner (lowercase for GHCR)
        shell: bash
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      # -------------------------------
      # Setup emulation + builder
      # -------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------
      # Login to Docker Hub
      # -------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------------
      # Login to GitHub Container Registry (GHCR)
      # -------------------------------
      - name: Login to GHCR
        if: ${{ env.PUSH_TO_GHCR == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Prefer a PAT for GHCR when publishing a package name that doesn't match the repo name (e.g. "lazydocker-web"),
          # otherwise pushes may fail with 403 depending on package ownership/settings.
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.MY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      # -------------------------------
      # Build and Push for x86_64
      # -------------------------------
      - name: Build and push (x86_64) to Docker Hub
        if: ${{ env.PUSH_TO_GHCR != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lazydocker-web:x86_64
          cache-from: type=gha,scope=lazydocker-web-amd64
          cache-to: type=gha,mode=max,scope=lazydocker-web-amd64

      - name: Build and push (x86_64) to Docker Hub + GHCR
        if: ${{ env.PUSH_TO_GHCR == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lazydocker-web:x86_64
            ghcr.io/${{ env.OWNER_LC }}/lazydocker-web:x86_64
          cache-from: type=gha,scope=lazydocker-web-amd64
          cache-to: type=gha,mode=max,scope=lazydocker-web-amd64

      # -------------------------------
      # Build and Push for arm64
      # -------------------------------
      - name: Build and push (arm64) to Docker Hub
        if: ${{ env.PUSH_TO_GHCR != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lazydocker-web:arm64
          cache-from: type=gha,scope=lazydocker-web-arm64
          cache-to: type=gha,mode=max,scope=lazydocker-web-arm64

      - name: Build and push (arm64) to Docker Hub + GHCR
        if: ${{ env.PUSH_TO_GHCR == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lazydocker-web:arm64
            ghcr.io/${{ env.OWNER_LC }}/lazydocker-web:arm64
          cache-from: type=gha,scope=lazydocker-web-arm64
          cache-to: type=gha,mode=max,scope=lazydocker-web-arm64

      # -------------------------------
      # Create multi-arch "latest" tag pointing to the arch-specific tags
      # -------------------------------
      - name: Create and push multi-arch manifest (Docker Hub)
        run: |
          docker buildx imagetools create \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/lazydocker-web:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/lazydocker-web:x86_64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/lazydocker-web:arm64

      - name: Create and push multi-arch manifest (GHCR)
        if: ${{ env.PUSH_TO_GHCR == 'true' }}
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.OWNER_LC }}/lazydocker-web:latest \
            ghcr.io/${{ env.OWNER_LC }}/lazydocker-web:x86_64 \
            ghcr.io/${{ env.OWNER_LC }}/lazydocker-web:arm64
